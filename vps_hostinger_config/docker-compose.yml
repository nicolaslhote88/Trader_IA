services:
  traefik:
    image: traefik
    command:
      - --api=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.mytlschallenge.acme.tlschallenge=true
      - --certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}
      - --certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - traefik_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/traefik/secrets:/secrets:ro
    networks:
      - web

  yfinance-api:
    build:
      context: ./yfinance-api
      dockerfile: Dockerfile
    container_name: yfinance-api
    environment:
      - TZ=Europe/Paris
      - YF_DATA_DIR=/data
      - YF_INIT_LOOKBACK_DAYS=400
      - YF_OVERLAP_BARS=3
      - YF_COOLDOWN_BASE_SEC=300
      - YF_COOLDOWN_MAX_SEC=3600
      - YF_COOLDOWN_RATELIMIT_SEC=1800
      - YF_MIN_SECONDS_BETWEEN_CALLS=5
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    volumes:
      - yfinance_data:/data
    networks:
      - web

  n8n:
    #image: docker.n8n.io/n8nio/n8n:2.1.4
    build: .
    #container_name: root-n8n-1
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.entrypoints=web,websecure
      - traefik.http.routers.n8n.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.n8n.headers.SSLRedirect=true
      - traefik.http.middlewares.n8n.headers.STSSeconds=315360000
      - traefik.http.middlewares.n8n.headers.browserXSSFilter=true
      - traefik.http.middlewares.n8n.headers.contentTypeNosniff=true
      - traefik.http.middlewares.n8n.headers.forceSTSHeader=true
      - traefik.http.middlewares.n8n.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.n8n.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.n8n.headers.STSPreload=true
      - traefik.http.routers.n8n.middlewares=n8n@docker
    environment:
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_BROKER_PORT=5679
      # On force ici une valeur simple pour tester si le 403 disparait
      - N8N_RUNNERS_AUTH_TOKEN=5IF4moeE571mNfi7LwzcBi301M22F9gE
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=1200
      - N8N_RUNNERS_HEARTBEAT_INTERVAL=1200
      - N8N_RUNNERS_TASK_TIMEOUT=1200
      - N8N_RUNNERS_MAX_CONCURRENCY=1
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - TRANSCRIPT_API_BASE=${TRANSCRIPT_API_BASE}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - AG1_DUCKDB_PATH=/files/duckdb/ag1_v2.duckdb
      - AG1_DUCKDB_WRITER_PATH=/files/AG1-V2-EXPORT/nodes/post_agent/duckdb_writer.py
      - AG1_LEDGER_SCHEMA_PATH=/files/AG1-V2-EXPORT/sql/portfolio_ledger_schema_v2.sql
      - EXECUTIONS_DATA_MAX_AGE=72
      - DB_SQLITE_VACUUM_ON_STARTUP=false
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: always
    ports:
      - 127.0.0.1:5678:5678
    volumes:
      - n8n_data:/home/node/.n8n
      - /local-files:/files
      - /opt/trader-ia/AG1-V2-EXPORT:/files/AG1-V2-EXPORT:ro
    depends_on:
      - yfinance-api
    networks:
      - web

  task-runners:
    build:
      context: .
      dockerfile: Dockerfile.runners
    pull_policy: never
    image: root-task-runners:2.3.5-duckdb
    #container_name: task-runners
    deploy:
      replicas: 3 # Va créer 3 conteneurs Task Runners qui écouteront n8n en parallèle
    environment:
      # L'adresse interne du service n8n sur le réseau Docker "web"
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      # DOIT être identique à la valeur dans le service n8n ci-dessus
      - N8N_RUNNERS_AUTH_TOKEN=5IF4moeE571mNfi7LwzcBi301M22F9gE
      - N8N_RUNNERS_MAX_CONCURRENCY=4
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TRANSCRIPT_API_BASE=${TRANSCRIPT_API_BASE}
      - N8N_RUNNERS_PYTHON_ALLOW_LIST=duckdb,pandas,numpy,datetime,math,json
      - AG1_DUCKDB_PATH=/files/duckdb/ag1_v2.duckdb
      - AG1_DUCKDB_WRITER_PATH=/files/AG1-V2-EXPORT/nodes/post_agent/duckdb_writer.py
      - AG1_LEDGER_SCHEMA_PATH=/files/AG1-V2-EXPORT/sql/portfolio_ledger_schema_v2.sql
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    volumes:
      - /opt/trader-ia/n8n-task-runners.json:/etc/n8n-task-runners.json:ro
      - /opt/trader-ia/duckdb_home:/home/runner/.duckdb:rw
      - /local-files:/files:rw
      - /opt/yf-enrichment-v1:/opt/yf-enrichment-v1:ro
    depends_on:
      - n8n
    networks:
      - web


  yf-enrichment:
    build:
      context: ./yf-enrichment-service
      dockerfile: Dockerfile
    container_name: yf-enrichment
    environment:
      - TZ=Europe/Paris
      # Script monté depuis /opt/yf-enrichment-v1 (déjà présent sur ton VPS)
      - YF_ENRICH_SCRIPT=/opt/yf-enrichment-v1/daily_enrichment.py
    restart: unless-stopped
    volumes:
      - /opt/yf-enrichment-v1:/opt/yf-enrichment-v1:ro
      - /local-files:/files:rw
    depends_on:
      - yfinance-api
    networks:
      - web
      
  trading-dashboard:
    image: python:3.12-slim
    working_dir: /app
    environment:
      - SHEET_ID=1l3fmopgQ8jVd__UTyIja3-nQkn7Jaxm19lcC32HQq8I
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/service_account.json
      - TZ=Europe/Paris
      - AG1_DUCKDB_PATH=/files/duckdb/ag1_v2.duckdb
    command: sh -lc "pip install --no-cache-dir -r requirements.txt && streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.tradingdash.rule=Host(`dashboard.nlhconsulting.fr`)
      - traefik.http.routers.tradingdash.entrypoints=websecure
      - traefik.http.routers.tradingdash.tls=true
      - traefik.http.routers.tradingdash.tls.certresolver=mytlschallenge
      - traefik.http.services.tradingdash.loadbalancer.server.port=8501
      - traefik.http.routers.tradingdash.middlewares=tradingdash-auth
      - traefik.http.middlewares.tradingdash-auth.basicauth.users=nicolas:$$2y$$05$$UboAT0t741bFU1a6dgfR1.FWSZ4PXeBPKC6fM7aaSOE5QXHavQ1vm,Cyril:$$2y$$05$$rsM.GSQbFxrnwfo0PlCpJ.7KfkTKNCfvFsqjskIF4Q93FheMeMZMW
    restart: unless-stopped
    volumes:
      - /opt/trading-dashboard/app:/app:ro
      - /opt/trading-dashboard/secrets:/secrets:ro
      - /local-files/duckdb:/files/duckdb:ro  # <--- AJOUTEZ CETTE LIGNE ICI
    networks:
      - web

  toolbox:
    image: alpine:3.20
    command: sh -lc "apk add --no-cache curl jq && sleep infinity"
    restart: unless-stopped
    networks:
      - web

  qdrant:
    image: qdrant/qdrant:v1.16.3
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage
    # Optionnel mais recommandé pour debug local (non exposé Internet)
    ports:
      - 127.0.0.1:6333:6333
      - 127.0.0.1:6334:6334
    networks:
      - web

networks:
  web:
    external: true

volumes:
  traefik_data:
    external: true
  n8n_data:
    external: true
  qdrant_data:
    external: true
    name: qdrant_data
  duckdb_home:
    
  yfinance_data:
    external: true
