services:
  yfinance-api:
    build:
      context: /opt/trader-ia/services/yfinance-api
      dockerfile: Dockerfile
    container_name: yfinance-api
    environment:
      - TZ=${GENERIC_TIMEZONE:-Europe/Paris}
      - YF_DATA_DIR=/data
      - YF_INIT_LOOKBACK_DAYS=400
      - YF_OVERLAP_BARS=3
      - YF_COOLDOWN_BASE_SEC=300
      - YF_COOLDOWN_MAX_SEC=3600
      - YF_COOLDOWN_RATELIMIT_SEC=1800
      - YF_MIN_SECONDS_BETWEEN_CALLS=5
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    volumes:
      - yfinance_data:/data
    networks:
      web:
        aliases:
          - yfinance-api

  yf-enrichment:
    build:
      context: /opt/trader-ia/services/yf-enrichment-service
      dockerfile: Dockerfile
    container_name: yf-enrichment
    environment:
      - TZ=${GENERIC_TIMEZONE:-Europe/Paris}
      - YF_ENRICH_SCRIPT=/opt/yf-enrichment-v1/daily_enrichment.py
    restart: unless-stopped
    volumes:
      - /opt/yf-enrichment-v1:/opt/yf-enrichment-v1:ro
      - /local-files:/files:rw
    depends_on:
      - yfinance-api
    networks:
      - web

networks:
  web:
    external: true

volumes:
  yfinance_data:
    external: true
    name: yfinance_data
