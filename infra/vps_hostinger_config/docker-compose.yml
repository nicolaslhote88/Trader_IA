services:
  traefik:
    image: traefik
    command:
      - --api=true
      - --api.insecure=true
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.mytlschallenge.acme.tlschallenge=true
      - --certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}
      - --certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - traefik_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/traefik/secrets:/secrets:ro
      - /opt/traefik_logs:/var/log/traefik
    networks:
      - web
      - traefik_proxy

  n8n:
    build: .
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.entrypoints=web,websecure
      - traefik.http.routers.n8n.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.n8n.headers.SSLRedirect=true
      - traefik.http.middlewares.n8n.headers.STSSeconds=315360000
      - traefik.http.middlewares.n8n.headers.browserXSSFilter=true
      - traefik.http.middlewares.n8n.headers.contentTypeNosniff=true
      - traefik.http.middlewares.n8n.headers.forceSTSHeader=true
      - traefik.http.middlewares.n8n.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.n8n.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.n8n.headers.STSPreload=true
      - traefik.http.routers.n8n.middlewares=n8n@docker
    environment:
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_PROXY_HOPS=1
      - NODE_ENV=production
      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Paris}
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_BROKER_PORT=5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_RUNNERS_TASK_REQUEST_TIMEOUT=1200
      - N8N_RUNNERS_HEARTBEAT_INTERVAL=1200
      - N8N_RUNNERS_TASK_TIMEOUT=1200
      - N8N_RUNNERS_MAX_CONCURRENCY=1
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - TRANSCRIPT_API_BASE=${TRANSCRIPT_API_BASE}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - AG1_DUCKDB_PATH=/files/duckdb/ag1_v3.duckdb
      - AG1_DUCKDB_WRITER_PATH=/files/AG1-V3-EXPORT/nodes/post_agent/duckdb_writer.py
      - AG1_LEDGER_SCHEMA_PATH=/files/AG1-V3-EXPORT/sql/portfolio_ledger_schema_v2.sql
      - AG1_FX_V1_CHATGPT52_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_chatgpt52.duckdb
      - AG1_FX_V1_GROK41_REASONING_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_grok41_reasoning.duckdb
      - AG1_FX_V1_GEMINI30_PRO_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_gemini30_pro.duckdb
      - AG2_FX_V1_DUCKDB_PATH=/files/duckdb/ag2_fx_v1.duckdb
      - AG4_FX_V1_DUCKDB_PATH=/files/duckdb/ag4_fx_v1.duckdb
      - AG1_FX_V1_WRITER_PATH=/files/AG1-FX-V1-EXPORT/nodes/post_agent/duckdb_writer.py
      - AG1_FX_V1_LEDGER_SCHEMA_PATH=/files/AG1-FX-V1-EXPORT/sql/ag1_fx_v1_schema.sql
      - EXECUTIONS_DATA_MAX_AGE=72
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=false
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=5000
      - DB_SQLITE_VACUUM_ON_STARTUP=true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: always
    ports:
      - 127.0.0.1:5678:5678
    volumes:
      - n8n_data:/home/node/.n8n
      - /local-files:/files
      - /opt/trader-ia/AG1-V2-EXPORT:/files/AG1-V2-EXPORT:ro
    networks:
      - web

  task-runners:
    image: root-task-runners:2.3.5-clean
    deploy:
      replicas: 3
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_MAX_CONCURRENCY=4
      - N8N_RUNNERS_LAUNCHER_LOG_LEVEL=debug
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Paris}
      - TRANSCRIPT_API_BASE=${TRANSCRIPT_API_BASE}
      - AG1_DUCKDB_PATH=/files/duckdb/ag1_v3.duckdb
      - AG1_DUCKDB_WRITER_PATH=/files/AG1-V3-EXPORT/nodes/post_agent/duckdb_writer.py
      - AG1_LEDGER_SCHEMA_PATH=/files/AG1-V3-EXPORT/sql/portfolio_ledger_schema_v2.sql
      - AG1_FX_V1_CHATGPT52_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_chatgpt52.duckdb
      - AG1_FX_V1_GROK41_REASONING_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_grok41_reasoning.duckdb
      - AG1_FX_V1_GEMINI30_PRO_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_gemini30_pro.duckdb
      - AG2_FX_V1_DUCKDB_PATH=/files/duckdb/ag2_fx_v1.duckdb
      - AG4_FX_V1_DUCKDB_PATH=/files/duckdb/ag4_fx_v1.duckdb
      - AG1_FX_V1_WRITER_PATH=/files/AG1-FX-V1-EXPORT/nodes/post_agent/duckdb_writer.py
      - AG1_FX_V1_LEDGER_SCHEMA_PATH=/files/AG1-FX-V1-EXPORT/sql/ag1_fx_v1_schema.sql
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped
    volumes:
      - /opt/trader-ia/n8n-task-runners.clean.json:/etc/n8n-task-runners.json:ro
      - /opt/trader-ia/duckdb_home:/home/runner/.duckdb:rw
      - /local-files:/files:rw
      - /opt/yf-enrichment-v1:/opt/yf-enrichment-v1:ro
      - n8n_data:/home/node/.n8n:rw
    depends_on:
      - n8n
    networks:
      - web

  trading-dashboard:
    image: python:3.12-slim
    working_dir: /app
    environment:
      - SHEET_ID=${GOOGLE_SHEET_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/service_account.json
      - TZ=${GENERIC_TIMEZONE:-Europe/Paris}
      - DUCKDB_DIR=/files/duckdb
      - AG2_DUCKDB_PATH=/files/duckdb/ag2_v3.duckdb
      - AG1_DUCKDB_PATH=/files/duckdb/ag1_v3.duckdb
      - AG1_CHATGPT52_DUCKDB_PATH=/files/duckdb/ag1_v3_chatgpt52.duckdb
      - AG1_GROK41_REASONING_DUCKDB_PATH=/files/duckdb/ag1_v3_grok41_reasoning.duckdb
      - AG1_GEMINI30_PRO_DUCKDB_PATH=/files/duckdb/ag1_v3_gemini30_pro.duckdb
      - AG3_DUCKDB_PATH=/files/duckdb/ag3_v2.duckdb
      - AG4_DUCKDB_PATH=/files/duckdb/ag4_v3.duckdb
      - AG4_SPE_DUCKDB_PATH=/files/duckdb/ag4_spe_v2.duckdb
      - AG4_FOREX_DUCKDB_PATH=/files/duckdb/ag4_forex_v1.duckdb
      - AG1_FX_V1_CHATGPT52_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_chatgpt52.duckdb
      - AG1_FX_V1_GROK41_REASONING_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_grok41_reasoning.duckdb
      - AG1_FX_V1_GEMINI30_PRO_DUCKDB_PATH=/files/duckdb/ag1_fx_v1_gemini30_pro.duckdb
      - AG2_FX_V1_DUCKDB_PATH=/files/duckdb/ag2_fx_v1.duckdb
      - AG4_FX_V1_DUCKDB_PATH=/files/duckdb/ag4_fx_v1.duckdb
      - YF_ENRICH_DUCKDB_PATH=/files/duckdb/yf_enrichment_v1.duckdb
    command: sh -lc "pip install --no-cache-dir -r requirements.txt && streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.tradingdash.rule=Host(`${DASHBOARD_DOMAIN}`)
      - traefik.http.routers.tradingdash.entrypoints=websecure
      - traefik.http.routers.tradingdash.tls=true
      - traefik.http.routers.tradingdash.tls.certresolver=mytlschallenge
      - traefik.http.services.tradingdash.loadbalancer.server.port=8501
      - traefik.http.routers.tradingdash.middlewares=tradingdash-auth
      - traefik.http.middlewares.tradingdash-auth.basicauth.users=${DASHBOARD_BASIC_AUTH}
    restart: unless-stopped
    volumes:
      - /opt/trading-dashboard/app:/app:ro
      - /opt/trading-dashboard/secrets:/secrets:ro
      - /local-files/duckdb:/files/duckdb:ro
    networks:
      - web

  toolbox:
    image: alpine:3.20
    command: sh -lc "apk add --no-cache curl jq && sleep infinity"
    restart: unless-stopped
    networks:
      - web

networks:
  traefik_proxy:
    external: true
  web:
    external: true

volumes:
  traefik_data:
    external: true
  n8n_data:
    external: true
