<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  body { margin: 0; background: #0e1117; font-family: system-ui, sans-serif; padding: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .group-title { color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; color: white; }
  .pill  { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 0.8rem; font-weight: 700; color: white; }
</style>
</head><body>
  <div class="group">
    <div class="group-title">Signal Badges</div>
    <span class="badge" style="background:#28a745;">BUY</span>
    <span class="badge" style="background:#dc3545;">SELL</span>
    <span class="badge" style="background:#6c757d;">NEUTRAL</span>
    <span class="badge" style="background:#28a745;">APPROVE</span>
    <span class="badge" style="background:#dc3545;">REJECT</span>
    <span class="badge" style="background:#fd7e14;">WATCH</span>
    <span class="badge" style="background:#0d6efd;">RUNNING</span>
    <span class="badge" style="background:#28a745;">SUCCESS</span>
    <span class="badge" style="background:#fd7e14;">PARTIAL</span>
    <span class="badge" style="background:#dc3545;">FAILED</span>
  </div>
  <div class="group">
    <div class="group-title">Risk Badges</div>
    <span class="badge" style="background:#dc3545;">RISK OFF</span>
    <span class="badge" style="background:#28a745;">RISK ON</span>
    <span class="badge" style="background:#6c757d;">—</span>
  </div>
  <div class="group">
    <div class="group-title">Severity Pills</div>
    <span class="pill" style="background:#dc3545;">HIGH</span>
    <span class="pill" style="background:#fd7e14;">MEDIUM</span>
    <span class="pill" style="background:#28a745;">LOW</span>
    <span class="pill" style="background:#6c757d;">NEUTRAL</span>
  </div>
  <div class="group">
    <div class="group-title">Cell Badges (table)</div>
    <span class="badge" style="background:#14532d;color:#dcfce7;">BUY</span>
    <span class="badge" style="background:#7f1d1d;color:#fee2e2;">SELL</span>
    <span class="badge" style="background:#374151;color:#e5e7eb;">NEUTRAL</span>
    <span class="badge" style="background:#7c2d12;color:#ffedd5;">REJECT</span>
    <span class="badge" style="background:#78350f;color:#fef3c7;">WATCH</span>
    <span class="badge" style="background:#1f2937;color:#d1d5db;">SKIP</span>
  </div>
</body></html>
