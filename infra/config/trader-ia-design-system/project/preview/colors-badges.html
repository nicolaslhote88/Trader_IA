<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  body { margin: 0; background: #0e1117; font-family: system-ui, sans-serif; padding: 16px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
  .pair { display: flex; flex-direction: column; gap: 4px; }
  .chip { padding: 8px 14px; border-radius: 4px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .label { color: #666; font-size: 10px; font-family: monospace; text-align: center; }
</style>
</head><body>
  <div class="pair"><div class="chip" style="background:#14532d;color:#dcfce7;">BUY</div><div class="label">#14532d / #dcfce7</div></div>
  <div class="pair"><div class="chip" style="background:#7f1d1d;color:#fee2e2;">SELL</div><div class="label">#7f1d1d / #fee2e2</div></div>
  <div class="pair"><div class="chip" style="background:#374151;color:#e5e7eb;">NEUTRAL</div><div class="label">#374151 / #e5e7eb</div></div>
  <div class="pair"><div class="chip" style="background:#14532d;color:#dcfce7;">APPROVE</div><div class="label">#14532d / #dcfce7</div></div>
  <div class="pair"><div class="chip" style="background:#7c2d12;color:#ffedd5;">REJECT</div><div class="label">#7c2d12 / #ffedd5</div></div>
  <div class="pair"><div class="chip" style="background:#78350f;color:#fef3c7;">WATCH</div><div class="label">#78350f / #fef3c7</div></div>
  <div class="pair"><div class="chip" style="background:#1f2937;color:#d1d5db;">SKIP</div><div class="label">#1f2937 / #d1d5db</div></div>
</body></html>
