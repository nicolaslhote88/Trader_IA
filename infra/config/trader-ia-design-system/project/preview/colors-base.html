<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  body { margin: 0; background: #0e1117; font-family: system-ui, sans-serif; padding: 16px; display: flex; flex-wrap: wrap; gap: 12px; }
  .swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .color-block { width: 80px; height: 52px; border-radius: 6px; border: 1px solid #333; }
  .label { color: #9aa0a6; font-size: 10px; font-family: monospace; }
  .name { color: #ccc; font-size: 11px; font-weight: 600; }
  .section { display: flex; flex-direction: column; gap: 6px; }
  .section-title { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head><body>
<div class="section">
  <div class="section-title">App Backgrounds</div>
  <div class="swatch-row">
    <div class="swatch"><div class="color-block" style="background:#0e1117;"></div><div class="name">App BG</div><div class="label">#0e1117</div></div>
    <div class="swatch"><div class="color-block" style="background:#1e1e2e;"></div><div class="name">Surface</div><div class="label">#1e1e2e</div></div>
    <div class="swatch"><div class="color-block" style="background:#262730;"></div><div class="name">Table Hdr</div><div class="label">#262730</div></div>
    <div class="swatch"><div class="color-block" style="background:#222;"></div><div class="name">Track BG</div><div class="label">#222222</div></div>
    <div class="swatch"><div class="color-block" style="background:#1f2937;"></div><div class="name">Input</div><div class="label">#1f2937</div></div>
  </div>
</div>
<div class="section">
  <div class="section-title">Borders</div>
  <div class="swatch-row">
    <div class="swatch"><div class="color-block" style="background:#444;"></div><div class="name">Strong</div><div class="label">#444444</div></div>
    <div class="swatch"><div class="color-block" style="background:#333;"></div><div class="name">Default</div><div class="label">#333333</div></div>
  </div>
</div>
<div class="section">
  <div class="section-title">Text</div>
  <div class="swatch-row">
    <div class="swatch"><div class="color-block" style="background:#fff;"></div><div class="name">Primary</div><div class="label">#ffffff</div></div>
    <div class="swatch"><div class="color-block" style="background:#ccc;"></div><div class="name">Secondary</div><div class="label">#cccccc</div></div>
    <div class="swatch"><div class="color-block" style="background:#9aa0a6;"></div><div class="name">Muted</div><div class="label">#9aa0a6</div></div>
    <div class="swatch"><div class="color-block" style="background:#666;"></div><div class="name">Disabled</div><div class="label">#666666</div></div>
  </div>
</div>
</body></html>
