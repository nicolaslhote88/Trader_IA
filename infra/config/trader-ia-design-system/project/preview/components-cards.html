<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  body { margin: 0; background: #0e1117; font-family: system-ui, sans-serif; padding: 16px; display: flex; flex-wrap: wrap; gap: 12px; }
  .card {
    background: #1e1e2e;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 16px;
    width: 200px;
  }
  .card h4 { margin: 0 0 8px 0; color: #ccc; font-size: 0.85rem; font-weight: 600; }
  .card .value { color: #fff; font-size: 1.3rem; font-weight: 700; }
  .card .sub { color: #9aa0a6; font-size: 0.75rem; margin-top: 4px; }
  .card .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-top: 8px; }
</style>
</head><body>
  <div class="card">
    <h4>Total Portefeuille</h4>
    <div class="value">€52,340</div>
    <div class="sub">+4.68% depuis init</div>
    <span class="badge" style="background:#28a745;color:#fff;">+€2,340</span>
  </div>
  <div class="card">
    <h4>Cash disponible</h4>
    <div class="value">€12,800</div>
    <div class="sub">24.5% du portefeuille</div>
  </div>
  <div class="card">
    <h4>Positions ouvertes</h4>
    <div class="value">14</div>
    <div class="sub">8 actions · 4 ETF · 2 FX</div>
  </div>
  <div class="card">
    <h4>Dernier run AG1</h4>
    <div class="value" style="font-size:0.95rem;">il y a 18 min</div>
    <div class="sub">GPT-5.2 · Grok-4.1 · Gemini-3</div>
    <span class="badge" style="background:#0d6efd;color:#fff;">RUNNING</span>
  </div>
</body></html>
