    <div class="label">#10b981</div>
  </div>
  <div class="agent">
    <div class="color-block" style="background:#f59e0b;"></div>
    <div class="name">Grok-4.1</div>
    <div class="sub">Grok 4.1 Reasoning</div>
    <div class="label">#f59e0b</div>
  </div>
  <div class="agent">
    <div class="color-block" style="background:#60a5fa;"></div>

  </div>
