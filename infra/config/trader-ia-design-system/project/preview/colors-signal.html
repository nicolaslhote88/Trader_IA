<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  body { margin: 0; background: #0e1117; font-family: system-ui, sans-serif; padding: 16px; }
  .swatch-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .color-block { width: 90px; height: 52px; border-radius: 6px; }
  .label { color: #9aa0a6; font-size: 10px; font-family: monospace; }
  .name { color: #ccc; font-size: 11px; font-weight: 600; }
</style>
</head><body>
<div class="swatch-row">
  <div class="swatch"><div class="color-block" style="background:#28a745;"></div><div class="name">Buy / Success</div><div class="label">#28a745</div></div>
  <div class="swatch"><div class="color-block" style="background:#dc3545;"></div><div class="name">Sell / Danger</div><div class="label">#dc3545</div></div>
  <div class="swatch"><div class="color-block" style="background:#fd7e14;"></div><div class="name">Watch / Warn</div><div class="label">#fd7e14</div></div>
  <div class="swatch"><div class="color-block" style="background:#0d6efd;"></div><div class="name">Action / Run</div><div class="label">#0d6efd</div></div>
  <div class="swatch"><div class="color-block" style="background:#6c757d;"></div><div class="name">Neutral</div><div class="label">#6c757d</div></div>
  <div class="swatch"><div class="color-block" style="background:#198754;"></div><div class="name">Success Alt</div><div class="label">#198754</div></div>
  <div class="swatch"><div class="color-block" style="background:#4ea1ff;"></div><div class="name">Chart Line</div><div class="label">#4ea1ff</div></div>
</div>
</body></html>
