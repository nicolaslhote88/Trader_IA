<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Trading Executor — TradingSim AI</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e1117; color: #fff; font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; height: 100vh; overflow: hidden; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1e1e2e; } ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Tokens ──────────────────────────────────────── */
const T = {
  bgApp: '#0e1117', bgSurface: '#1e1e2e', bgTableHdr: '#262730', bgSubtle: '#222',
  border: '#333', borderStrong: '#444',
  textPrimary: '#fff', textSecondary: '#ccc', textMuted: '#9aa0a6', textDisabled: '#666',
  buy: '#28a745', sell: '#dc3545', watch: '#fd7e14', action: '#0d6efd', neutral: '#6c757d',
  agentGpt: '#10b981', agentGrok: '#f59e0b', agentGemini: '#60a5fa',
  chartLine: '#4ea1ff',
};

/* ── Primitives ──────────────────────────────────── */
function Badge({ type, children, pill }) {
  const map = {
    buy:     { bg: '#14532d', color: '#dcfce7' },
    sell:    { bg: '#7f1d1d', color: '#fee2e2' },
    neutral: { bg: '#374151', color: '#e5e7eb' },
    approve: { bg: '#14532d', color: '#dcfce7' },
    reject:  { bg: '#7c2d12', color: '#ffedd5' },
    watch:   { bg: '#78350f', color: '#fef3c7' },
    skip:    { bg: '#1f2937', color: '#d1d5db' },
    running: { bg: T.action,  color: '#fff' },
    success: { bg: T.buy,     color: '#fff' },
    failed:  { bg: T.sell,    color: '#fff' },
    partial: { bg: T.watch,   color: '#fff' },
    info:    { bg: T.neutral, color: '#fff' },
  };
  const s = map[type] || map.info;
  return (
    <span style={{
      display: 'inline-block', padding: pill ? '4px 10px' : '3px 8px',
      borderRadius: pill ? 999 : 4, fontSize: '0.78rem', fontWeight: 700,
      background: s.bg, color: s.color, whiteSpace: 'nowrap',
    }}>{children}</span>
  );
}

function MetricCard({ label, value, sub, delta, deltaType }) {
  const deltaColor = deltaType === 'pos' ? T.buy : deltaType === 'neg' ? T.sell : T.textMuted;
  return (
    <div style={{ background: T.bgSurface, border: `1px solid ${T.border}`, borderRadius: 8, padding: '14px 16px', flex: 1, minWidth: 130 }}>
      <div style={{ color: T.textMuted, fontSize: '0.8rem', marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: '1.5rem', fontWeight: 700, color: T.textPrimary }}>{value}</div>
      {delta && <div style={{ color: deltaColor, fontSize: '0.78rem', marginTop: 4, fontWeight: 600 }}>{delta}</div>}
      {sub && <div style={{ color: T.textDisabled, fontSize: '0.72rem', marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function IndicatorBar({ label, value, pct, zone, min, max }) {
  const zoneColors = { overbought: T.sell, trending: T.buy, neutral: T.neutral, elevated: T.watch, oversold: T.buy };
  const zc = zoneColors[zone] || T.neutral;
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
        <span style={{ color: T.textSecondary, fontSize: '0.83em', fontWeight: 600 }}>{label}</span>
        <span style={{ color: zc, fontSize: '0.83em', fontWeight: 700 }}>{value} — {zone}</span>
      </div>
      <div style={{ position: 'relative', height: 10, background: T.bgSubtle, borderRadius: 5, overflow: 'hidden' }}>
        <div style={{ position: 'absolute', left: '0%', width: '30%', height: '100%', background: T.buy, opacity: 0.25 }}></div>
        <div style={{ position: 'absolute', left: '30%', width: '40%', height: '100%', background: T.neutral, opacity: 0.25 }}></div>
        <div style={{ position: 'absolute', left: '70%', width: '30%', height: '100%', background: T.sell, opacity: 0.25 }}></div>
        <div style={{ position: 'absolute', left: `${pct}%`, top: 0, width: 3, height: '100%', background: '#fff', borderRadius: 1, transform: 'translateX(-1px)', zIndex: 2 }}></div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 1 }}>
        <span style={{ color: T.textDisabled, fontSize: '0.7em' }}>{min}</span>
        <span style={{ color: T.textDisabled, fontSize: '0.7em' }}>{max}</span>
      </div>
    </div>
  );
}

function SparklinePlaceholder({ symbol, pnl, positive }) {
  const fillColor = positive ? 'rgba(40,167,69,0.18)' : 'rgba(220,53,69,0.16)';
  // Simple SVG path approximation
  const pts = positive
    ? "20,60 60,50 100,45 140,38 180,32 220,28 260,22 300,18"
    : "20,20 60,28 100,35 140,42 180,50 220,55 260,60 300,65";
  return (
    <div style={{ background: T.bgSurface, border: `1px solid ${T.border}`, borderRadius: 8, padding: '10px 12px', minWidth: 200 }}>
      <div style={{ color: T.textSecondary, fontSize: '0.78rem', fontWeight: 600, marginBottom: 6 }}>
        {symbol} <span style={{ color: positive ? T.buy : T.sell }}>{pnl}</span>
      </div>
      <svg width="100%" height="60" viewBox="0 0 300 80" preserveAspectRatio="none">
        <defs>
          <linearGradient id={`fill-${symbol}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={positive ? T.buy : T.sell} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={positive ? T.buy : T.sell} stopOpacity="0.0"/>
          </linearGradient>
        </defs>
        <polygon points={`20,80 ${pts} 300,80`} fill={`url(#fill-${symbol})`}/>
        <polyline points={pts} fill="none" stroke={T.chartLine} strokeWidth="1.8"/>
      </svg>
    </div>
  );
}

function DataTable({ columns, rows }) {
  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.88rem' }}>
        <thead>
          <tr>
            {columns.map(c => (
              <th key={c} style={{ background: T.bgTableHdr, color: T.textPrimary, padding: '10px 12px', textAlign: 'left', borderBottom: `2px solid ${T.borderStrong}`, whiteSpace: 'nowrap' }}>{c}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => (
            <tr key={i} style={{ background: row._tint || 'transparent' }}>
              {columns.map(c => (
                <td key={c} style={{ padding: '10px 12px', borderBottom: `1px solid ${T.border}`, color: T.textSecondary, verticalAlign: 'top', lineHeight: 1.5 }}>
                  {row[c]}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function SectionDivider() {
  return <div style={{ borderTop: `1px solid ${T.border}`, margin: '16px 0' }}></div>;
}

function TabBar({ tabs, active, onSelect }) {
  return (
    <div style={{ display: 'flex', gap: 2, borderBottom: `1px solid ${T.border}`, marginBottom: 16 }}>
      {tabs.map(t => (
        <button key={t} onClick={() => onSelect(t)} style={{
          background: 'none', border: 'none', cursor: 'pointer',
          padding: '8px 14px', fontSize: '0.85rem', fontWeight: active === t ? 600 : 400,
          color: active === t ? T.textPrimary : T.textMuted,
          borderBottom: active === t ? `2px solid ${T.action}` : '2px solid transparent',
          marginBottom: -1,
        }}>{t}</button>
      ))}
    </div>
  );
}
